<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada (404) – Impulso Automatizado SL</title>
<meta name="description" content="La página que buscas no existe o ha sido movida.">
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23009e7a'/%3E%3Cstop offset='100%25' style='stop-color:%2327c96a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='8' y='8' width='48' height='48' rx='10' fill='url(%23g)'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-weight='900' font-size='24' fill='white' text-anchor='middle'%3EIA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #009e7a;
    --green: #27c96a;
    --text-dark: #0a1f12;
    --text-body: #2a4535;
    --grad-main: linear-gradient(135deg, #009e7a 0%, #00a868 45%, #27c96a 100%);
    --grad-bg: linear-gradient(135deg, #f4fdf8 0%, #d8f7e6 46%, #c8f1da 100%);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    background: var(--grad-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    line-height: 1.6;
  }
  .wrap { max-width: 560px; }
  .code {
    font-family: 'Playfair Display', serif;
    font-size: clamp(96px, 20vw, 160px);
    font-weight: 800;
    line-height: 1;
    background: var(--grad-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 38px);
    font-weight: 800;
    margin-bottom: 16px;
    color: var(--text-dark);
  }
  p {
    color: var(--text-body);
    font-size: 16px;
    margin-bottom: 32px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  .actions {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  }
  .btn-primary {
    padding: 14px 30px; border-radius: 50px;
    background: var(--grad-main);
    color: white; font-weight: 600; font-size: 15px;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(0,158,122,0.40);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(0,158,122,0.55);
  }
  .btn-secondary {
    padding: 14px 30px; border-radius: 50px;
    background: rgba(255,255,255,0.6);
    color: var(--text-dark); font-weight: 600; font-size: 15px;
    text-decoration: none;
    border: 2px solid rgba(0,150,80,0.22);
    transition: all 0.2s;
  }
  .btn-secondary:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="code" aria-hidden="true">404</div>
    <h1>Esta página no existe</h1>
    <p>La página que buscabas se ha movido, ya no está disponible o nunca existió. Vuelve al inicio o ponte en contacto con nosotros.</p>
    <div class="actions">
      <a class="btn-primary" href="/">Volver al inicio</a>
      <a class="btn-secondary" href="/#contacto">Contactar</a>
    </div>
  </main>
</body>
</html>
